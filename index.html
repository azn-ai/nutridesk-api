<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>NutriDesk</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
<style>
  :root {
    --bg:        #0d0d14;
    --surface:   rgba(255,255,255,0.05);
    --border:    rgba(255,255,255,0.08);
    --accent:    #7c6aff;
    --accent2:   #ff6ab0;
    --text:      #f0f0f8;
    --muted:     rgba(240,240,248,0.4);
    --radius:    18px;
    --glow:      0 0 40px rgba(124,106,255,0.18);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Inter', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* animated background blobs */
  body::before, body::after {
    content: '';
    position: fixed;
    border-radius: 50%;
    filter: blur(80px);
    opacity: 0.18;
    pointer-events: none;
    z-index: 0;
  }
  body::before {
    width: 500px; height: 500px;
    background: radial-gradient(circle, #7c6aff, transparent);
    top: -120px; left: -100px;
    animation: drift 12s ease-in-out infinite alternate;
  }
  body::after {
    width: 400px; height: 400px;
    background: radial-gradient(circle, #ff6ab0, transparent);
    bottom: -100px; right: -80px;
    animation: drift 15s ease-in-out infinite alternate-reverse;
  }
  @keyframes drift { from { transform: translate(0,0); } to { transform: translate(40px, 30px); } }

  /* ── LAYOUT ── */
  .app {
    position: relative; z-index: 1;
    max-width: 520px;
    margin: 0 auto;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    padding: 0 0 100px;
  }

  /* ── HEADER ── */
  .header {
    padding: 32px 24px 0;
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .header-logo {
    width: 38px; height: 38px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    border-radius: 12px;
    display: flex; align-items: center; justify-content: center;
    font-size: 18px;
    box-shadow: 0 4px 20px rgba(124,106,255,0.4);
  }
  .header h1 { font-size: 20px; font-weight: 700; letter-spacing: -0.5px; }
  .header span { font-size: 20px; font-weight: 300; color: var(--muted); }

  /* ── BOTTOM NAV ── */
  .nav {
    position: fixed;
    bottom: 0; left: 50%;
    transform: translateX(-50%);
    width: 100%; max-width: 520px;
    background: rgba(13,13,20,0.85);
    backdrop-filter: blur(20px);
    border-top: 1px solid var(--border);
    display: flex;
    z-index: 100;
    padding: 8px 0 12px;
  }
  .nav-btn {
    flex: 1; background: none; border: none;
    color: var(--muted); cursor: pointer;
    display: flex; flex-direction: column;
    align-items: center; gap: 4px;
    padding: 8px 0;
    font-family: 'Inter', sans-serif;
    transition: color .2s;
  }
  .nav-btn .nav-icon {
    width: 44px; height: 44px;
    border-radius: 14px;
    display: flex; align-items: center; justify-content: center;
    font-size: 20px;
    transition: background .2s, transform .2s;
  }
  .nav-btn .nav-label { font-size: 11px; font-weight: 500; letter-spacing: 0.3px; }
  .nav-btn.active { color: var(--text); }
  .nav-btn.active .nav-icon {
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    transform: translateY(-4px);
    box-shadow: 0 8px 24px rgba(124,106,255,0.45);
  }
  .nav-btn:not(.active):hover .nav-icon { background: var(--surface); }

  /* ── PANELS ── */
  .panel { display: none; padding: 24px 20px 0; animation: fadeUp .3s ease; }
  .panel.active { display: block; }
  @keyframes fadeUp { from { opacity:0; transform:translateY(12px); } to { opacity:1; transform:translateY(0); } }

  .section-title {
    font-size: 13px; font-weight: 600;
    text-transform: uppercase; letter-spacing: 1.2px;
    color: var(--muted); margin-bottom: 14px;
  }

  /* ── GLASS CARD ── */
  .glass {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    backdrop-filter: blur(12px);
  }

  /* ── NOTES ── */
  .notes-wrapper { position: relative; }
  #notes-area {
    width: 100%; height: calc(100vh - 240px);
    background: transparent; border: none; outline: none;
    color: var(--text); font-family: 'Inter', sans-serif;
    font-size: 15px; line-height: 1.75; resize: none;
    padding: 20px;
    caret-color: var(--accent);
  }
  #notes-area::placeholder { color: var(--muted); }
  .notes-footer {
    display: flex; justify-content: space-between; align-items: center;
    padding: 10px 20px 14px;
    border-top: 1px solid var(--border);
  }
  .char-count { font-size: 12px; color: var(--muted); }
  .save-pill {
    font-size: 11px; font-weight: 600; letter-spacing: 0.5px;
    padding: 4px 10px; border-radius: 20px;
    background: rgba(124,106,255,0.15); color: var(--accent);
    transition: opacity .3s;
  }

  /* ── CALCULATOR ── */
  .calc-display-wrap {
    padding: 24px 20px 16px;
    text-align: right;
  }
  .calc-expr { font-size: 13px; color: var(--muted); min-height: 18px; margin-bottom: 4px; }
  #calc-display {
    font-size: 42px; font-weight: 300; letter-spacing: -1px;
    color: var(--text); background: none; border: none; outline: none;
    width: 100%; text-align: right;
    font-family: 'Inter', sans-serif;
  }
  .calc-grid {
    display: grid; grid-template-columns: repeat(4, 1fr);
    gap: 10px; padding: 0 16px 20px;
  }
  .calc-grid button {
    height: 64px; font-size: 18px; font-weight: 500;
    border: none; border-radius: 14px; cursor: pointer;
    font-family: 'Inter', sans-serif;
    transition: transform .1s, opacity .15s;
    position: relative; overflow: hidden;
  }
  .calc-grid button:active { transform: scale(0.93); }
  .btn-num {
    background: rgba(255,255,255,0.06);
    color: var(--text);
    border: 1px solid var(--border);
  }
  .btn-num:hover { background: rgba(255,255,255,0.1); }
  .btn-op {
    background: rgba(124,106,255,0.15);
    color: var(--accent);
    border: 1px solid rgba(124,106,255,0.2);
    font-size: 20px;
  }
  .btn-op:hover { background: rgba(124,106,255,0.25); }
  .btn-clr {
    background: rgba(255,106,176,0.12);
    color: var(--accent2);
    border: 1px solid rgba(255,106,176,0.2);
  }
  .btn-clr:hover { background: rgba(255,106,176,0.22); }
  .btn-bksp {
    background: rgba(255,159,67,0.12);
    color: #ff9f43;
    border: 1px solid rgba(255,159,67,0.2);
    font-size: 20px;
  }
  .btn-bksp:hover { background: rgba(255,159,67,0.22); }
  .btn-eq {
    grid-column: span 2;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    color: #fff; font-size: 22px;
    box-shadow: 0 6px 24px rgba(124,106,255,0.4);
    border: none;
  }
  .btn-eq:hover { opacity: .9; }

  /* ── MACROS ── */
  .search-bar {
    display: flex; gap: 10px; margin-bottom: 16px;
  }
  .search-input-wrap {
    flex: 1; position: relative;
  }
  .search-icon {
    position: absolute; left: 14px; top: 50%; transform: translateY(-50%);
    font-size: 16px; pointer-events: none;
  }
  .search-bar input {
    width: 100%; padding: 13px 14px 13px 40px;
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 14px; color: var(--text);
    font-family: 'Inter', sans-serif; font-size: 15px; outline: none;
    transition: border .2s;
  }
  .search-bar input:focus { border-color: var(--accent); }
  .search-bar input::placeholder { color: var(--muted); }
  .grams-wrap { position: relative; }
  .grams-wrap input {
    width: 80px; padding: 13px 10px 13px 10px;
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 14px; color: var(--text);
    font-family: 'Inter', sans-serif; font-size: 15px; outline: none;
    text-align: center; transition: border .2s;
  }
  .grams-wrap input:focus { border-color: var(--accent); }
  .grams-label {
    position: absolute; bottom: -18px; left: 50%; transform: translateX(-50%);
    font-size: 10px; color: var(--muted); white-space: nowrap;
  }
  .search-btn {
    width: 50px; height: 50px; border-radius: 14px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    border: none; color: #fff; font-size: 20px; cursor: pointer;
    box-shadow: 0 4px 20px rgba(124,106,255,0.4);
    transition: transform .15s, opacity .15s;
    flex-shrink: 0;
  }
  .search-btn:hover { opacity: .9; transform: scale(1.05); }
  .search-btn:active { transform: scale(0.95); }

  .status-text { font-size: 13px; color: var(--muted); padding: 8px 0 4px; }
  .status-text.error { color: var(--accent2); }

  .results-list { list-style: none; display: flex; flex-direction: column; gap: 8px; }
  .result-item {
    padding: 14px 16px; border-radius: 14px; cursor: pointer;
    background: var(--surface); border: 1px solid var(--border);
    transition: border-color .2s, background .2s, transform .15s;
    display: flex; align-items: center; gap: 12px;
  }
  .result-item:hover { border-color: var(--accent); background: rgba(124,106,255,0.08); transform: translateX(3px); }
  .result-icon {
    width: 38px; height: 38px; border-radius: 10px; flex-shrink: 0;
    background: linear-gradient(135deg, rgba(124,106,255,0.2), rgba(255,106,176,0.2));
    display: flex; align-items: center; justify-content: center; font-size: 18px;
  }
  .result-text .food-name { font-size: 14px; font-weight: 600; }
  .result-text .food-brand { font-size: 12px; color: var(--muted); margin-top: 2px; }
  .result-arrow { margin-left: auto; color: var(--muted); font-size: 16px; }

  /* macro result card */
  .macro-result {
    border-radius: var(--radius); overflow: hidden;
    border: 1px solid var(--border); margin-top: 8px;
    animation: fadeUp .3s ease;
  }
  .macro-result-header {
    padding: 18px 20px 14px;
    background: linear-gradient(135deg, rgba(124,106,255,0.15), rgba(255,106,176,0.1));
    border-bottom: 1px solid var(--border);
  }
  .macro-result-header h3 { font-size: 16px; font-weight: 700; }
  .macro-result-header p { font-size: 12px; color: var(--muted); margin-top: 3px; }
  .macro-tiles {
    display: grid; grid-template-columns: 1fr 1fr;
    gap: 1px; background: var(--border);
  }
  .macro-tile {
    background: var(--bg); padding: 18px 20px;
    display: flex; flex-direction: column; gap: 6px;
  }
  .macro-tile-icon { font-size: 22px; }
  .macro-tile-label { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.8px; color: var(--muted); }
  .macro-tile-value { font-size: 24px; font-weight: 700; }
  .macro-tile-unit { font-size: 12px; color: var(--muted); margin-left: 2px; font-weight: 400; }
  .tile-cal .macro-tile-value { color: #ff9f43; }
  .tile-pro .macro-tile-value { color: #54a0ff; }
  .tile-carb .macro-tile-value { color: #5f27cd; background: linear-gradient(135deg,#a29bfe,#fd79a8); -webkit-background-clip:text; -webkit-text-fill-color:transparent; }
  .tile-fib .macro-tile-value { color: #00d2d3; }

  /* spinner */
  .spinner {
    width: 28px; height: 28px; margin: 24px auto;
    border: 3px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin .7s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* scrollbar */
  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
</style>
</head>
<body>
<div class="app">

  <!-- HEADER -->
  <div class="header">
    <div class="header-logo">🌿</div>
    <h1>NutriDesk <span>·</span></h1>
  </div>

  <!-- NOTES PANEL -->
  <div id="tab-notes" class="panel active" style="padding-top:20px">
    <p class="section-title">My Notes</p>
    <div class="glass notes-wrapper">
      <textarea id="notes-area" placeholder="Jot down anything — try typing 'carrot 25g' and pressing Enter!"></textarea>
      <div class="notes-footer">
        <span class="char-count" id="char-count">0 characters</span>
        <span class="save-pill" id="save-msg">Auto-saved</span>
      </div>
    </div>
  </div>

  <!-- CALCULATOR PANEL -->
  <div id="tab-calc" class="panel">
    <p class="section-title">Calculator</p>
    <div class="glass">
      <div class="calc-display-wrap">
        <div class="calc-expr" id="calc-expr"></div>
        <input id="calc-display" type="text" readonly value="0"/>
      </div>
      <div class="calc-grid">
        <button class="btn-clr"  onclick="calcClear()">C</button>
        <button class="btn-bksp" onclick="calcBackspace()">⌫</button>
        <button class="btn-op"   onclick="calcInput('(')">(</button>
        <button class="btn-op"   onclick="calcInput(')')">)</button>

        <button class="btn-num" onclick="calcInput('7')">7</button>
        <button class="btn-num" onclick="calcInput('8')">8</button>
        <button class="btn-num" onclick="calcInput('9')">9</button>
        <button class="btn-op"  onclick="calcInput('*')">×</button>

        <button class="btn-num" onclick="calcInput('4')">4</button>
        <button class="btn-num" onclick="calcInput('5')">5</button>
        <button class="btn-num" onclick="calcInput('6')">6</button>
        <button class="btn-op"  onclick="calcInput('-')">−</button>

        <button class="btn-num" onclick="calcInput('1')">1</button>
        <button class="btn-num" onclick="calcInput('2')">2</button>
        <button class="btn-num" onclick="calcInput('3')">3</button>
        <button class="btn-op"  onclick="calcInput('+')">+</button>

        <button class="btn-num" onclick="calcInput('0')">0</button>
        <button class="btn-num" onclick="calcInput('.')">.</button>
        <button class="btn-op"  onclick="calcInput('/')">÷</button>
        <button class="btn-eq"  onclick="calcEquals()">=</button>
      </div>
    </div>
  </div>

  <!-- MACROS PANEL -->
  <div id="tab-macros" class="panel">
    <p class="section-title">Macro Search</p>
    <div class="search-bar">
      <div class="search-input-wrap">
        <span class="search-icon">🔍</span>
        <input id="food-input" type="text" placeholder="Search food… e.g. carrot"/>
      </div>
      <div class="grams-wrap">
        <input id="grams-input" type="number" min="1" value="100"/>
        <span class="grams-label">grams</span>
      </div>
      <button class="search-btn" onclick="searchFood()">↗</button>
    </div>

    <p id="macro-status" class="status-text"></p>
    <ul id="results-list" class="results-list"></ul>
    <div id="macro-card"></div>
  </div>

</div>

<!-- BOTTOM NAV -->
<nav class="nav">
  <button class="nav-btn active" id="nav-notes" onclick="switchTab('notes', this)">
    <div class="nav-icon">📝</div>
    <span class="nav-label">Notes</span>
  </button>
  <button class="nav-btn" id="nav-calc" onclick="switchTab('calc', this)">
    <div class="nav-icon">🧮</div>
    <span class="nav-label">Calculator</span>
  </button>
  <button class="nav-btn" id="nav-macros" onclick="switchTab('macros', this)">
    <div class="nav-icon">🥗</div>
    <span class="nav-label">Macros</span>
  </button>
</nav>

<script>
// ── TABS ──────────────────────────────────────────────
function switchTab(name, btn) {
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('tab-' + name).classList.add('active');
  btn.classList.add('active');
}

// ── NOTES ─────────────────────────────────────────────
const notesArea  = document.getElementById('notes-area');
const saveMsg    = document.getElementById('save-msg');
const charCount  = document.getElementById('char-count');
notesArea.value  = localStorage.getItem('notes') || '';
charCount.textContent = notesArea.value.length + ' characters';

function saveNotes() {
  localStorage.setItem('notes', notesArea.value);
  charCount.textContent = notesArea.value.length + ' characters';
  saveMsg.textContent = 'Saved ✓';
  setTimeout(() => { saveMsg.textContent = 'Auto-saved'; }, 1500);
}

notesArea.addEventListener('input', saveNotes);

notesArea.addEventListener('keydown', async (e) => {
  if (e.key !== 'Enter') return;
  const lines = notesArea.value.split('\n');
  const lastLine = lines[lines.length - 1].trim();
  const match = lastLine.match(/^(.+?)\s+(\d+(?:\.\d+)?)\s*g$/i);
  if (!match) return;

  const foodName = match[1].trim();
  const grams    = parseFloat(match[2]);

  e.preventDefault();
  saveMsg.textContent = '🔍 Looking up macros...';

  try {
    const res   = await fetch(`${BASE}/search?q=${encodeURIComponent(foodName)}`);
    const data  = await res.json();
    const foods = data?.foods?.food;
    if (!foods) { notesArea.value += '\n'; saveNotes(); return; }
    const food  = Array.isArray(foods) ? foods[0] : foods;

    const res2  = await fetch(`${BASE}/food?id=${food.food_id}`);
    const data2 = await res2.json();
    const servings = data2?.food?.servings?.serving;
    const arr   = Array.isArray(servings) ? servings : [servings];
    const base  = arr.find(s => s.serving_description?.includes('100')) || arr[0];

    const s   = grams / 100;
    const fmt = v => (parseFloat(v || 0) * s).toFixed(1);

    const macroLine = `  → ${fmt(base.calories)}kcal | Protein: ${fmt(base.protein)}g | Carbs: ${fmt(base.carbohydrate)}g | Fibre: ${fmt(base.fiber)}g`;
    notesArea.value += '\n' + macroLine + '\n';
    saveNotes();
  } catch {
    notesArea.value += '\n';
    saveNotes();
  }
});

// ── CALCULATOR ────────────────────────────────────────
let calcExpr = '';
const display  = document.getElementById('calc-display');
const exprLine = document.getElementById('calc-expr');

function calcInput(val) {
  if (display.value === 'Error') { calcExpr = ''; }
  if (calcExpr === '' && display.value === '0' && !isNaN(val)) {}
  calcExpr += val;
  display.value = calcExpr;
  exprLine.textContent = '';
}
function calcClear() {
  calcExpr = '';
  display.value = '0';
  exprLine.textContent = '';
}
function calcBackspace() {
  if (display.value === 'Error') { calcExpr = ''; display.value = '0'; return; }
  calcExpr = calcExpr.slice(0, -1);
  display.value = calcExpr || '0';
}
function calcEquals() {
  try {
    exprLine.textContent = calcExpr + ' =';
    const result = Function('"use strict"; return (' + calcExpr + ')')();
    calcExpr = String(parseFloat(result.toFixed(10)));
    display.value = calcExpr;
  } catch {
    display.value = 'Error';
    exprLine.textContent = '';
    calcExpr = '';
  }
}

// ── MACROS ────────────────────────────────────────────
const BASE = 'https://kind-adventure-production-a455.up.railway.app';
const FOOD_EMOJIS = ['🥕','🥦','🍗','🥩','🍎','🍌','🥚','🧀','🍞','🥑','🐟','🥜'];
const randEmoji = () => FOOD_EMOJIS[Math.floor(Math.random() * FOOD_EMOJIS.length)];

async function searchFood() {
  const query  = document.getElementById('food-input').value.trim();
  if (!query) return;
  const status = document.getElementById('macro-status');
  const list   = document.getElementById('results-list');
  const card   = document.getElementById('macro-card');
  list.innerHTML = '';
  card.innerHTML = '';
  status.className = 'status-text';
  status.innerHTML = '<div class="spinner"></div>';

  try {
    const res   = await fetch(`${BASE}/search?q=${encodeURIComponent(query)}`);
    const data  = await res.json();
    const foods = data?.foods?.food;
    if (!foods) { status.textContent = 'No results found.'; return; }
    status.textContent = 'Tap a food to see its macros';
    const arr = Array.isArray(foods) ? foods : [foods];
    arr.forEach(f => {
      const li = document.createElement('li');
      li.className = 'result-item';
      li.innerHTML = `
        <div class="result-icon">${randEmoji()}</div>
        <div class="result-text">
          <div class="food-name">${f.food_name}</div>
          <div class="food-brand">${f.brand_name || 'Generic'} · ${f.food_type}</div>
        </div>
        <span class="result-arrow">›</span>`;
      li.onclick = () => loadMacros(f.food_id, f.food_name);
      list.appendChild(li);
    });
  } catch {
    status.className = 'status-text error';
    status.textContent = '⚠ Could not connect — is server.py running?';
  }
}

async function loadMacros(id, name) {
  const grams = parseFloat(document.getElementById('grams-input').value) || 100;
  const card  = document.getElementById('macro-card');
  card.innerHTML = '<div class="spinner"></div>';

  try {
    const res  = await fetch(`${BASE}/food?id=${id}`);
    const data = await res.json();
    const servings = data?.food?.servings?.serving;
    const arr  = Array.isArray(servings) ? servings : [servings];
    const base = arr.find(s => s.serving_description?.includes('100')) || arr[0];

    const p100 = {
      cal:   parseFloat(base.calories      || 0),
      pro:   parseFloat(base.protein       || 0),
      carb:  parseFloat(base.carbohydrate  || 0),
      fib:   parseFloat(base.fiber         || 0),
    };
    const s   = grams / 100;
    const fmt = v => (v * s).toFixed(1);

    card.innerHTML = `
      <div class="macro-result glass">
        <div class="macro-result-header">
          <h3>${name}</h3>
          <p>Per ${grams}g serving · from FatSecret</p>
        </div>
        <div class="macro-tiles">
          <div class="macro-tile tile-cal">
            <span class="macro-tile-icon">🔥</span>
            <span class="macro-tile-label">Calories</span>
            <div><span class="macro-tile-value">${fmt(p100.cal)}</span><span class="macro-tile-unit">kcal</span></div>
          </div>
          <div class="macro-tile tile-pro">
            <span class="macro-tile-icon">💪</span>
            <span class="macro-tile-label">Protein</span>
            <div><span class="macro-tile-value">${fmt(p100.pro)}</span><span class="macro-tile-unit">g</span></div>
          </div>
          <div class="macro-tile tile-carb">
            <span class="macro-tile-icon">⚡</span>
            <span class="macro-tile-label">Carbs</span>
            <div><span class="macro-tile-value">${fmt(p100.carb)}</span><span class="macro-tile-unit">g</span></div>
          </div>
          <div class="macro-tile tile-fib">
            <span class="macro-tile-icon">🌾</span>
            <span class="macro-tile-label">Fibre</span>
            <div><span class="macro-tile-value">${fmt(p100.fib)}</span><span class="macro-tile-unit">g</span></div>
          </div>
        </div>
      </div>`;
  } catch {
    card.innerHTML = '<p class="status-text error">⚠ Failed to load macros.</p>';
  }
}

document.getElementById('food-input').addEventListener('keydown', e => {
  if (e.key === 'Enter') searchFood();
});
</script>
</body>
</html>
